<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Media Editor Demo — Moor</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{
      background:#e0e0e0;min-height:100vh;
      display:flex;flex-direction:column;align-items:center;
      padding:24px 16px 48px;
      font-family:-apple-system,BlinkMacSystemFont,'PingFang TC','Helvetica Neue',sans-serif;
    }
    .phone{
      width:390px;height:820px;background:#111;
      border-radius:44px;border:2px solid #2a2a2a;
      overflow:hidden;position:relative;
      box-shadow:0 32px 80px rgba(0,0,0,0.45);flex-shrink:0;
    }
    .screen{width:100%;height:100%;background:#f5f5f5;color:#111;display:flex;flex-direction:column;overflow:hidden;position:relative;}
    .scroll{overflow-y:auto;overflow-x:hidden;}
    .scroll::-webkit-scrollbar,::-webkit-scrollbar{display:none;}
    input,textarea,button{outline:none;font-family:inherit;}
    textarea{resize:none;}
    input[type=range]{-webkit-appearance:none;width:100%;height:4px;border-radius:4px;background:#ddd;}
    input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:#111;cursor:pointer;}
    .sheet-enter{animation:sheetUp 0.24s cubic-bezier(0.22,1,0.36,1);}
    @keyframes sheetUp{from{transform:translateY(100%);}to{transform:translateY(0);}}
    .fade-in{animation:fadeIn 0.15s ease;}
    @keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
    @keyframes spin{to{transform:rotate(360deg);}}
    .tap:active{opacity:0.6;}
    video{display:block;width:100%;height:100%;object-fit:cover;background:#ddd;}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useRef,useEffect,useCallback} = React;

/* ── Tokens ── */
const T={

  txt:'#111111',sub:'#666666',hint:'#aaaaaa',div:'#ebebeb',

/* ── Mock data ── */

  {id:3,title:'週末下午特別場', start:'2026/03/14 15:00',shows:3,daysLeft:2},
];
const MUSIC=[
  {id:1,title:'輕快節奏 Vol.1',dur:'2:34'},
  {id:2,title:'抒情旋律',      dur:'3:12'},
  {id:3,title:'電子氛圍',      dur:'2:58'},

const FILTERS =['原始','暖調','冷調','鮮豔','褪色','黑白'];
const STICKERS=['心形','星形','閃光','鑽石','皇冠','彩帶','音符','火焰','笑臉','箭頭'];
const SPEEDS  =['0.5x','0.75x','1x','1.25x','1.5x','2x'];
const DIAMONDS=[0,100,300,500,1000,2000,3000,5000,6000];
const VID='https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerBlazes.mp4';

/* ── Heatmap ── */
const HMAP=(()=>{
  const d=[];
  for(let i=0;i<120;i++){
    let v=Math.random()*0.1;
    if(i>=15&&i<=22)v+=0.55*Math.sin((i-15)/7*Math.PI);
    if(i>=38&&i<=52)v+=0.92*Math.sin((i-38)/14*Math.PI);
    if(i>=63&&i<=74)v+=0.65*Math.sin((i-63)/11*Math.PI);
    if(i>=87&&i<=101)v+=0.80*Math.sin((i-87)/14*Math.PI);
    if(i>=108&&i<=116)v+=0.42*Math.sin((i-108)/8*Math.PI);
    d.push(Math.min(1,Math.max(0.05,v)));
  }
  return d;
})();

const fmt=m=>`${String(Math.floor(m/60)).padStart(2,'0')}:${String(m%60).padStart(2,'0')}`;
const peakInWindow=pos=>pos+HMAP.slice(pos,pos+10).reduce((mi,v,i,a)=>v>a[mi]?i:mi,0);

/* ── Reusable atoms ── */
const StatusBar=()=>(

    <span style={{fontSize:12,color:T.sub}}>4G &nbsp; 94%</span>

);

);

                          color:'#fff',fontSize:24,fontWeight:300}}>+</div>

              <span style={{fontSize:10,color:it.active?T.txt:T.hint,
                            fontWeight:it.active?600:400}}>{it.l}</span>

};

const Dialog=({title,msg,confirmLabel='確定',danger=false,onConfirm,onCancel})=>(

/* Wireframe thumbnail placeholder */
const ImgPlaceholder=({w,h,radius=8})=>(

      style={{background:T.sur,borderRadius:'20px 20px 0 0',width:'100%',
              paddingBottom:32,border:`1px solid ${T.bor}`}}>
      <div style={{display:'flex',justifyContent:'center',padding:'12px 0 4px'}}>
        <div style={{width:36,height:4,borderRadius:2,background:T.bor}}/>
      </div>

          style={{background:'none',border:'none',fontSize:18,color:T.hint,cursor:'pointer'}}>✕</button>
      </div>

      <div onClick={onAction} className="tap"
        style={{margin:'12px 16px 0',padding:'14px 16px',borderRadius:12,
                background:T.txt,cursor:'pointer',display:'flex',alignItems:'center',gap:14}}>
        <div style={{width:40,height:40,borderRadius:10,background:'rgba(255,255,255,0.12)',
                     border:'1px solid rgba(255,255,255,0.2)',flexShrink:0,
                     display:'flex',alignItems:'center',justifyContent:'center'}}>

/* ── Post Settings (anchor page) ── */

/* ── Preview Select (manual override) ── */
const PreviewSelect=({go,clipData})=>{
  const [pos,setPos]=useState(0);
  const tlRef=useRef(null);
  const drag=useRef({on:false,sx:0,sp:0});
  const W=10; // represents ~15s as fraction of clip

  const startDrag=e=>{drag.current={on:true,sx:e.clientX??e.touches?.[0]?.clientX,sp:pos};e.preventDefault();};
  const moveDrag=useCallback(e=>{
    if(!drag.current.on||!tlRef.current)return;
    const x=e.clientX??e.touches?.[0]?.clientX;
    const w=tlRef.current.getBoundingClientRect().width;
    const d=((x-drag.current.sx)/w)*100;
    setPos(Math.round(Math.max(0,Math.min(100-W,drag.current.sp+d))));
  },[]);
  const endDrag=()=>{drag.current.on=false;};

  useEffect(()=>{
    window.addEventListener('mousemove',moveDrag);
    window.addEventListener('mouseup',endDrag);
    window.addEventListener('touchmove',moveDrag,{passive:false});
    window.addEventListener('touchend',endDrag);
    return()=>{
      window.removeEventListener('mousemove',moveDrag);
      window.removeEventListener('mouseup',endDrag);
      window.removeEventListener('touchmove',moveDrag);
      window.removeEventListener('touchend',endDrag);
    };
  },[moveDrag]);

  return(
    <div className="screen">
      <StatusBar/>
      <Header title="調整預覽片段" onBack={()=>go('post_settings')}/>
      <div className="scroll" style={{flex:1,padding:'16px 16px 40px'}}>
        <div style={{fontSize:13,color:T.sub,marginBottom:16,lineHeight:1.6}}>
          拖曳選取 15 秒的預覽片段，或點擊下方使用系統自動選取。
        </div>
        {/* Video strip */}
        <div style={{borderRadius:10,overflow:'hidden',marginBottom:12,
                     background:'#1a1a1a',position:'relative',height:80,cursor:'grab'}}
             ref={tlRef} onMouseDown={startDrag} onTouchStart={startDrag}>
          <video src={VID} style={{width:'100%',height:'100%',objectFit:'cover',opacity:0.55}} muted/>
          {/* Window */}
          <div style={{position:'absolute',top:0,bottom:0,left:`${pos}%`,width:`${W}%`,
                       border:'2px solid #fff',borderRadius:4,background:'rgba(255,255,255,0.12)',
                       display:'flex',alignItems:'center',justifyContent:'center'}}>
            <span style={{fontSize:9,color:'#fff',fontWeight:600}}>15秒</span>
          </div>
        </div>
        <div style={{background:T.sur,borderRadius:10,border:`1px solid ${T.bor}`,
                     padding:'10px 12px',marginBottom:20}}>
          <div style={{fontSize:12,color:T.sub}}>拖曳白框選取預覽位置</div>
        </div>
        <button onClick={()=>go('post_settings')} className="tap"
          style={{width:'100%',padding:'13px',borderRadius:12,background:T.cta,color:T.ctaT,
                  fontSize:15,fontWeight:700,border:'none',cursor:'pointer',marginBottom:10}}>
          確認選取
        </button>
        <button onClick={()=>go('post_settings')} className="tap"
          style={{width:'100%',padding:'13px',borderRadius:12,background:T.sur,color:T.sub,
                  fontSize:14,border:`1px solid ${T.bor}`,cursor:'pointer'}}>
          使用系統自動選取
        </button>
      </div>
    </div>
  );
};

/* ── Clip Select ── */
const ClipSelect=({go,vod,winPos,setWinPos,setClipData})=>{
  const tlRef=useRef(null);
  const drag=useRef({on:false,sx:0,sp:0});

  const startDrag=e=>{drag.current={on:true,sx:e.clientX??e.touches?.[0]?.clientX,sp:winPos};e.preventDefault();};
  const moveDrag=useCallback(e=>{
    if(!drag.current.on||!tlRef.current)return;
    const x=e.clientX??e.touches?.[0]?.clientX;
    const w=tlRef.current.getBoundingClientRect().width;
    const d=((x-drag.current.sx)/w)*120;
    setWinPos(Math.round(Math.max(0,Math.min(110,drag.current.sp+d))));
  },[]);
  const endDrag=()=>{drag.current.on=false;};

  useEffect(()=>{
    window.addEventListener('mousemove',moveDrag);
    window.addEventListener('mouseup',endDrag);
    window.addEventListener('touchmove',moveDrag,{passive:false});
    window.addEventListener('touchend',endDrag);
    return()=>{
      window.removeEventListener('mousemove',moveDrag);
      window.removeEventListener('mouseup',endDrag);
      window.removeEventListener('touchmove',moveDrag);
      window.removeEventListener('touchend',endDrag);
    };
  },[moveDrag]);

  const peak=peakInWindow(winPos);

  return(
    <div className="screen">
      <StatusBar/>
      <Header title="選取片段" onBack={()=>go('post_settings')}
        right={<span style={{fontSize:12,color:T.sub}}>{vod?.title}</span>}/>
      <div className="scroll" style={{flex:1}}>
        {/* Video */}

        <div style={{padding:'14px 16px'}}>
          <div style={{fontSize:12,color:T.sub,marginBottom:4}}>{vod?.start}</div>

            <span style={{fontSize:11,color:T.hint}}>拖曳視窗選取 10 分鐘片段</span>
          </div>

          {/* Heatmap */}
          <div ref={tlRef} style={{position:'relative',marginBottom:6,userSelect:'none'}}>
            <div style={{display:'flex',alignItems:'flex-end',height:64,gap:'1px',
                         background:T.sur,borderRadius:8,padding:'5px 3px 3px',
                         border:`1px solid ${T.bor}`,overflow:'hidden'}}>
              {HMAP.map((v,i)=>{
                const inW=i>=winPos&&i<winPos+10;
                const g=Math.round(inW?(40+v*180):(220-v*80));
                return(
                  <div key={i} style={{flex:1,borderRadius:1,minWidth:1,
                                       height:`${Math.max(8,v*100)}%`,
                                       background:`rgb(${g},${g},${g})`}}/>

            <div onMouseDown={startDrag} onTouchStart={startDrag}
              style={{position:'absolute',top:0,bottom:0,
                      left:`${(winPos/120)*100}%`,width:`${(10/120)*100}%`,
                      border:`2px solid ${T.txt}`,borderRadius:8,
                      background:'rgba(0,0,0,0.05)',cursor:'grab',touchAction:'none'}}>
              <div style={{position:'absolute',top:'50%',left:3,transform:'translateY(-50%)',
                           width:2,height:18,background:T.txt,borderRadius:1}}/>
              <div style={{position:'absolute',top:'50%',right:3,transform:'translateY(-50%)',
                           width:2,height:18,background:T.txt,borderRadius:1}}/>

          {/* Time axis */}
          <div style={{display:'flex',justifyContent:'space-between',marginBottom:14}}>

              <span key={t} style={{fontSize:9,color:T.hint}}>{t}</span>

                       padding:'12px 14px',marginBottom:12}}>
            <div style={{fontSize:11,color:T.hint,marginBottom:8}}>已選取片段</div>

        </div>
      </div>

  );

/* ── Loading ── */
const Loading=({go})=>{
  const [prog,setProg]=useState(0);
  useEffect(()=>{
    const t=setInterval(()=>setProg(p=>{
      if(p>=100){clearInterval(t);setTimeout(()=>go('editor'),300);return 100;}
      return Math.min(100,p+Math.random()*8+4);
    }),180);
    return()=>clearInterval(t);
  },[]);
  return(
    <div className="screen" style={{alignItems:'center',justifyContent:'center',
                                     gap:20,padding:40,background:T.sur}}>
      <div style={{width:64,height:64,borderRadius:16,background:T.bg,border:`1px solid ${T.bor}`,
                   display:'flex',alignItems:'center',justifyContent:'center'}}>
        <div style={{width:24,height:24,border:`3px solid ${T.bor}`,borderTop:`3px solid ${T.txt}`,
                     borderRadius:'50%',animation:'spin 0.8s linear infinite'}}/>

      <div style={{fontSize:18,fontWeight:700}}>讀取中</div>
      <div style={{fontSize:13,color:T.sub,textAlign:'center',lineHeight:1.6}}>正在準備剪輯素材，請稍候</div>
      <div style={{width:240,background:T.bg,borderRadius:100,height:6,border:`1px solid ${T.bor}`,overflow:'hidden'}}>
        <div style={{height:'100%',background:T.cta,borderRadius:100,
                     width:`${Math.min(100,prog)}%`,transition:'width 0.18s'}}/>
      </div>
      <div style={{fontSize:13,color:T.sub}}>{Math.min(100,Math.round(prog))}%</div>
    </div>
  );
};

    分割:(
      <div><PH title="分割片段"/>
        <div style={{fontSize:13,color:T.sub,marginBottom:16}}>在目前播放位置分割影片</div>
        <button onClick={()=>setPanel(null)} className="tap"
          style={{width:'100%',padding:'12px',borderRadius:10,background:T.cta,color:T.ctaT,
                  fontSize:14,fontWeight:700,border:'none',cursor:'pointer'}}>確認分割</button>
      </div>
    ),
  };

  const handleDone=()=>{
    setClipData({vod,winPos});
    go('post_settings');
  };

  return(
    <div className="screen" style={{background:T.sur,position:'relative'}}>
      {/* Top bar */}
      <div style={{padding:'44px 20px 12px',display:'flex',justifyContent:'space-between',
                   alignItems:'center',borderBottom:`1px solid ${T.bor}`,flexShrink:0}}>
        <button onClick={()=>setDialog('cancelEdit')} className="tap"
          style={{background:'none',border:'none',fontSize:13,color:T.sub,cursor:'pointer'}}>取消</button>
        <span style={{fontSize:16,fontWeight:700}}>剪輯精華</span>
        <button onClick={handleDone} className="tap"
          style={{background:T.cta,border:'none',borderRadius:8,padding:'6px 14px',
                  color:T.ctaT,fontSize:13,fontWeight:700,cursor:'pointer'}}>完成</button>
      </div>

      {/* Video */}
      <div style={{background:'#1a1a1a',aspectRatio:'16/9',flexShrink:0,overflow:'hidden',
                   position:'relative',display:'flex',alignItems:'center',justifyContent:'center'}}>
        <div style={{opacity:0.15,position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center'}}>
          <div style={{width:0,height:0,borderTop:'16px solid transparent',
                       borderBottom:'16px solid transparent',borderLeft:'28px solid rgba(255,255,255,0.5)'}}/>
        </div>
        {music&&<div style={{position:'absolute',bottom:8,left:10,background:'rgba(0,0,0,0.55)',
                              color:'#fff',fontSize:10,padding:'2px 7px',borderRadius:4}}>
          音樂：{MUSIC.find(m=>m.id===music)?.title}</div>}
        {filter!=='原始'&&<div style={{position:'absolute',bottom:8,right:10,background:'rgba(0,0,0,0.55)',
                                       color:'#fff',fontSize:10,padding:'2px 7px',borderRadius:4}}>
          濾鏡：{filter}</div>}
        {sticker&&<div style={{position:'absolute',top:10,right:12,background:'rgba(0,0,0,0.5)',
                                color:'#fff',fontSize:10,padding:'2px 7px',borderRadius:4}}>[{sticker}]</div>}
        {speed!=='1x'&&<div style={{position:'absolute',top:10,left:10,background:'rgba(0,0,0,0.5)',
                                     color:'#fff',fontSize:10,padding:'2px 7px',borderRadius:4}}>速度 {speed}</div>}
      </div>

      {/* Toolbar */}
      <div style={{display:'flex',overflowX:'auto',padding:'8px 12px',
                   borderBottom:`1px solid ${T.bor}`,flexShrink:0,gap:2}}>
        {TOOLS.map(t=>(
          <button key={t} onClick={()=>setPanel(panel===t?null:t)} className="tap"
            style={{display:'flex',flexDirection:'column',alignItems:'center',gap:4,
                    padding:'6px 9px',borderRadius:8,flexShrink:0,cursor:'pointer',
                    background:panel===t?T.bg:'none',
                    border:`1px solid ${panel===t?T.bor:'transparent'}`}}>
            <div style={{width:20,height:20,borderRadius:4,background:T.bg,
                         border:`1.5px solid ${panel===t?T.txt:T.bor}`}}/>
            <span style={{fontSize:10,color:panel===t?T.txt:T.sub,fontWeight:panel===t?600:400}}>{t}</span>
          </button>
        ))}
      </div>

      {/* Timeline */}
      <div style={{padding:'10px 16px 8px',flexShrink:0}}>
        <div style={{fontSize:10,color:T.hint,marginBottom:5}}>時間軸</div>
        <div style={{background:T.bg,border:`1px solid ${T.bor}`,borderRadius:8,height:48,
                     position:'relative',overflow:'hidden'}}>
          <div style={{position:'absolute',left:'4%',right:'4%',top:6,bottom:6,
                       background:'rgba(0,0,0,0.05)',border:`1.5px solid ${T.txt}`,borderRadius:5,
                       display:'flex',alignItems:'center',justifyContent:'center'}}>
            <span style={{fontSize:10,color:T.sub}}>精華片段 · {fmt(winPos)} — {fmt(winPos+10)}</span>
          </div>
          <div style={{position:'absolute',left:'28%',top:0,bottom:0,width:1.5,background:T.txt,opacity:0.5}}/>
        </div>
      </div>

      <div style={{flex:1}}/>

      {panel&&<div onClick={()=>setPanel(null)}
        style={{position:'absolute',inset:0,zIndex:40,background:'rgba(0,0,0,0.15)'}}/>}
      {panel&&panels[panel]&&(
        <div className="sheet-enter"
          style={{position:'absolute',bottom:0,left:0,right:0,background:T.sur,
                  borderRadius:'18px 18px 0 0',padding:'18px 16px 32px',zIndex:50,
                  maxHeight:300,overflowY:'auto',border:`1px solid ${T.bor}`,
                  boxShadow:'0 -4px 24px rgba(0,0,0,0.06)'}}>
          {panels[panel]}
        </div>
      )}
    </div>
  );
};

/* ── Uploading ── */
const Uploading=({go})=>{
  const [prog,setProg]=useState(0);
  const [phase,setPhase]=useState('process');
  useEffect(()=>{
    const t=setInterval(()=>setProg(p=>{
      if(p>=100){clearInterval(t);setTimeout(()=>go('success'),400);return 100;}
      if(p>48&&phase==='process')setPhase('upload');
      return Math.min(100,p+Math.random()*5+3);
    }),180);
    return()=>clearInterval(t);
  },[]);
  return(
    <div className="screen" style={{alignItems:'center',justifyContent:'center',
                                     gap:20,padding:40,background:T.sur}}>
      <div style={{width:64,height:64,borderRadius:16,background:T.bg,border:`1px solid ${T.bor}`,
                   display:'flex',alignItems:'center',justifyContent:'center'}}>
        <div style={{width:24,height:24,border:`3px solid ${T.bor}`,borderTop:`3px solid ${T.txt}`,
                     borderRadius:'50%',animation:'spin 0.8s linear infinite'}}/>
      </div>
      <div style={{fontSize:18,fontWeight:700}}>{phase==='process'?'處理影片中':'上傳中'}</div>
      <div style={{fontSize:13,color:T.sub}}>{phase==='process'?'本地端處理影片…':'正在上傳至平台…'}</div>
      <div style={{width:240,background:T.bg,borderRadius:100,height:6,border:`1px solid ${T.bor}`,overflow:'hidden'}}>
        <div style={{height:'100%',background:T.cta,borderRadius:100,width:`${Math.min(100,prog)}%`,transition:'width 0.18s'}}/>
      </div>
      <div style={{fontSize:13,color:T.sub}}>{Math.min(100,Math.round(prog))}%</div>
    </div>
  );
};

/* ── Success ── */
const Success=({go})=>(
  <div className="screen" style={{alignItems:'center',justifyContent:'center',
                                   gap:16,padding:'32px 24px',background:T.sur}}>
    <div style={{width:72,height:72,borderRadius:'50%',background:T.bg,border:`2px solid ${T.bor}`,
                 display:'flex',alignItems:'center',justifyContent:'center',fontSize:32}}>✓</div>
    <div style={{fontSize:22,fontWeight:700}}>發布成功</div>
    <div style={{fontSize:13,color:T.sub,textAlign:'center',lineHeight:1.8}}>
      直播精華已上架至個人頁面「影片」Tab<br/>粉絲可以付費解鎖觀看
    </div>
    <div style={{background:T.bg,borderRadius:14,padding:'14px 16px',width:'100%',
                 marginTop:4,border:`1px solid ${T.bor}`}}>
      {[['顯示位置','影片 Tab'],['解鎖費用','500 鑽'],['預覽片段','15 秒']].map(([l,v])=>(
        <div key={l} style={{display:'flex',justifyContent:'space-between',
                              padding:'7px 0',borderBottom:`1px solid ${T.div}`}}>
          <span style={{fontSize:13,color:T.sub}}>{l}</span>
          <span style={{fontSize:13,fontWeight:600}}>{v}</span>
        </div>
      ))}
    </div>
    <button onClick={()=>go('personal_center')} className="tap"
      style={{width:'100%',padding:'14px',borderRadius:12,background:T.cta,color:T.ctaT,
              fontSize:15,fontWeight:700,border:'none',cursor:'pointer',marginTop:4}}>
      查看貼文
    </button>
    <button onClick={()=>go('post_settings')} className="tap"
      style={{width:'100%',padding:'13px',borderRadius:12,background:T.sur,color:T.txt,
              fontSize:14,border:`1px solid ${T.bor}`,cursor:'pointer'}}>
      繼續上架其他精華
    </button>
  </div>
);

/* ── Flow nav ── */
const NAV=[
  ['personal_center','個人中心'],
  ['post_settings','貼文設定'],
  ['clip_select','選取片段'],
  ['loading','讀取中'],
  ['editor','剪輯'],
  ['preview_select','調整預覽'],
  ['uploading','上傳中'],
  ['success','完成'],
];

/* ── App ── */
const App=()=>{
  const [screen,setScreen]=useState('personal_center');
  const [vod,setVod]=useState(VODS[0]);
  const [winPos,setWinPos]=useState(38);
  const [clipData,setClipData]=useState(null);
  const [showCreate,setShowCreate]=useState(false);
  const [dialog,setDialog]=useState(null);

  const go=s=>{setScreen(s);setShowCreate(false);};

  const render=()=>{
    const p={go,setDialog};
    switch(screen){
      case 'personal_center': return <PersonalCenter onPlus={()=>setShowCreate(true)}/>;
      case 'post_settings':   return <PostSettings {...p} clipData={clipData} setClipData={setClipData}
                                       setVod={setVod} winPos={winPos} setWinPos={setWinPos}/>;
      case 'clip_select':     return <ClipSelect {...p} vod={vod} winPos={winPos} setWinPos={setWinPos}
                                       setClipData={setClipData}/>;
      case 'loading':         return <Loading go={go}/>;
      case 'editor':          return <Editor {...p} vod={vod} winPos={winPos} setClipData={setClipData}/>;
      case 'preview_select':  return <PreviewSelect go={go} clipData={clipData}/>;
      case 'uploading':       return <Uploading go={go}/>;
      case 'success':         return <Success go={go}/>;
    }
  };

  return(
    <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:16}}>
      {/* Flow nav */}
      <div style={{display:'flex',gap:4,alignItems:'center',flexWrap:'wrap',justifyContent:'center',maxWidth:640}}>
        {NAV.map(([s,l],i)=>(
          <React.Fragment key={s}>
            <button onClick={()=>go(s)}
              style={{padding:'4px 11px',borderRadius:20,fontSize:11,border:'none',cursor:'pointer',
                      background:screen===s?'#111':'#d0d0d0',
                      color:screen===s?'#fff':'#555',fontWeight:screen===s?700:400}}>{l}</button>
            {i<NAV.length-1&&<span style={{color:'#bbb',fontSize:10}}>›</span>}
          </React.Fragment>
        ))}
      </div>

      <div className="phone">
        {render()}
        {showCreate&&(
          <CreateMenu onClose={()=>setShowCreate(false)} onAction={()=>go('post_settings')}/>
        )}
        {dialog==='cancelEdit'&&(
          <Dialog title="放棄編輯？"
            msg="目前的剪輯內容將不會儲存，確定要離開嗎？"
            confirmLabel="放棄編輯" danger
            onConfirm={()=>{setDialog(null);go('post_settings');}}
            onCancel={()=>setDialog(null)}/>
        )}
      </div>
      <div style={{color:'#aaa',fontSize:11}}>Media Editor Demo · Moor APP · Wireframe v3</div>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
